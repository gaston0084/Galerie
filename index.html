<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #5f9ea0;
        font-family: Broadway, sans-serif;
        font-family: f5f1e8;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 3rem;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        max-width: 1600px;
        margin: auto;
    }

    .bildbox {
        background: rgb(223, 218, 196);
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(45, 92, 101, 0.2);
        text-align: center;
    }

    .bildbox img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        display: block;
    }

    .bildbox p {
        margin-top: 10px;
        font-size: 1rem;
        font-weight: bold;
        font-family: Bahnschrift Light SemiCondensed;
    }

    .bildbox a {
        text-decoration: none;
        color: inherit;
    }

    /* Tablet */
    @media (max-width: 1000px) {
        .gallery {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    /* Handy */
    @media (max-width: 600px) {
        .gallery {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<h1>Meine Galerie</h1>

<div class="gallery">

    <div class="bildbox">
        <a href="02Markt.png">
            <img src="02Markt.png" alt="Markt">
        </a>
        <p>Markt</p>
    </div>

    <div class="bildbox">
        <a href="Karte.png">
            <img src="Karte.png" alt="Bild 2">
        </a>
        <p>Karte</p>
    </div>

    <div class="bildbox">
        <a href="ErstesTreffen.png">
            <img src="ErstesTreffen.png" alt="Bild 3">
        </a>
        <p>ErstesTreffen</p>
    </div>

    <div class="bildbox">
        <a href="SonnenblumenSymbol.png">
            <img src="SonnenblumenSymbol.png" alt="Bild 4">
        </a>
        <p>SonnenblumenSymbol</p>
    </div>
    
    <div class="bildbox">
        <a href="Versteck2.png">
            <img src="Versteck2.png" alt="Bild 4">
        </a>
        <p>Versteck2</p>
    </div>
    
     <div class="bildbox">
        <a href="Gedenktafel2.png">
            <img src="Gedenktafel2.png" alt="Bild 4">
        </a>
        <p>Gedenktafel2</p>
    </div>

</div>

</body>
</html>
