<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>02Markt</title>



<style>

    body {

        margin: 0;

        min-height: 100vh;

        background: #f5f1e8;

        font-family: Arial, sans-serif;

        display: flex;

        justify-content: center;

        align-items: center;

    }



    .bildbox {

        max-width: 900px;

        padding: 20px;

        background: rgb(223, 218, 196);

        border-radius: 12px;

        box-shadow: 0 4px 12px rgba(45, 92, 101, 0.2);

        text-align: center;

    }



    h1 {

        margin-top: 0;

        margin-bottom: 20px;

    }



    img {

        width: 100%;

        height: auto;

        border-radius: 8px;

        display: block;

    }



    a {

        display: inline-block;

        margin-top: 15px;

        color: #286d90;

        text-decoration: none;

    }



    a:hover {

        text-decoration: underline;

    }

</style>

</head>



<body>



<div class="bildbox">

    <h1>02Markt</h1>



    <a href="02Markt.png">

        <img src="02Markt.png" alt="Historische Marktszene">

    </a>



    <a href="02Markt.png">Bild direkt öffnen</a>

</div>



</body>

</html>
