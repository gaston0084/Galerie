<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Galerie</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #f5f1e8;
        font-family: Arial, sans-serif;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        max-width: 1600px;
        margin: auto;
    }

    .bildbox {
        background: rgb(223, 218, 196);
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(45, 92, 101, 0.2);
        text-align: center;
    }

    .bildbox img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        display: block;
    }

    .bildbox a {
        text-decoration: none;
        color: inherit;
    }

    /* Tablet */
    @media (max-width: 1000px) {
        .gallery {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    /* Handy */
    @media (max-width: 600px) {
        .gallery {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<h1>Meine Galerie</h1>

<div class="gallery">

    <!-- Markt -->
    <div class="bildbox">
        <a href="02Markt.png">
            <img src="02Markt.png" alt="Historische Marktszene">
        </a>
        <p>02Markt</p>
    </div>

    <!-- Karte -->
    <div class="bildbox">
        <a href="Karte.png">
            <img src="Karte.png" alt="Karte von Syldniavien">
        </a>
        <p>Karte</p>
    </div>

</div>

</body>
</html>
